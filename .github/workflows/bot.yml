name: Auto News Bot
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4           # ✅ Updated from v3 to v4
      - name: Setup Python
        uses: actions/setup-python@v5       # ✅ Updated from v4 to v5
        with:
          python-version: '3.12'            # ✅ Updated to 3.12
      - name: Install libraries
        run: pip install requests feedparser google-generativeai
      - name: Run Bot
        run: python news_bot.py
